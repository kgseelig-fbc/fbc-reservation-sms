// ─── Excel Parsing ──────────────────────────────────────────────
const EXPECTED_FIELDS = [
  { key: "name", label: "Guest Name", required: true, aliases: ["name", "guest", "guest name", "full name", "customer", "member", "member name"] },
  { key: "email", label: "Email", required: false, aliases: ["email", "e-mail", "email address", "guest email"] },
  { key: "phone", label: "Phone", required: false, aliases: ["phone", "phone number", "tel", "telephone", "mobile", "cell"] },
  { key: "service", label: "Service / Type", required: false, aliases: ["service", "type", "reservation type", "event", "event type", "booking type"] },
  { key: "date", label: "Date", required: true, aliases: ["date", "reservation date", "booking date", "event date", "day"] },
  { key: "time", label: "Time", required: false, aliases: ["time", "reservation time", "booking time", "start time", "arrival"] },
  { key: "guests", label: "Guests", required: false, aliases: ["guests", "party size", "party", "covers", "pax", "number of guests", "# guests", "size"] },
  { key: "notes", label: "Notes", required: false, aliases: ["notes", "note", "comments", "comment", "special requests", "requests", "dietary"] },
  { key: "channel", label: "Contact Method", required: false, aliases: ["channel", "contact method", "contact", "notification", "preferred contact"] },
];

function autoMapColumns(headers) {
  const mapping = {};
  const lowerHeaders = headers.map((h) => String(h || "").toLowerCase().trim());
  EXPECTED_FIELDS.forEach((field) => {
    const matchIdx = lowerHeaders.findIndex((h) => field.aliases.some((a) => h === a || h.includes(a)));
    if (matchIdx !== -1) mapping[field.key] = headers[matchIdx];
  });
  return mapping;
}

function parseExcelDate(value) {
  if (!value) return null;
  if (value instanceof Date) return value;
  if (typeof value === "number") {
    // Excel serial date
    const epoch = new Date(1899, 11, 30);
    return new Date(epoch.getTime() + value * 86400000);
  }
  const parsed = new Date(value);
  return isNaN(parsed.getTime()) ? null : parsed;
}

function parseTime(value, baseDate) {
  if (!value) return baseDate;
  const date = baseDate ? new Date(baseDate) : new Date();
  if (typeof value === "number") {
    // Excel fractional day
    const totalMinutes = Math.round(value * 24 * 60);
    date.setHours(Math.floor(totalMinutes / 60), totalMinutes % 60, 0, 0);
    return date;
  }
  const str = String(value).trim();
  const match = str.match(/(\d{1,2}):(\d{2})\s*(am|pm)?/i);
  if (match) {
    let h = parseInt(match[1]);
    const m = parseInt(match[2]);
    const ampm = match[3];
    if (ampm && ampm.toLowerCase() === "pm" && h < 12) h += 12;
    if (ampm && ampm.toLowerCase() === "am" && h === 12) h = 0;
    date.setHours(h, m, 0, 0);
  }
  return date;
}

function rowsToReservations(rows, mapping) {
  return rows.map((row, i) => {
    const get = (key) => row[mapping[key]] ?? "";
    const baseDate = parseExcelDate(get("date"));
    const dateWithTime = parseTime(get("time"), baseDate);
    const channelRaw = String(get("channel")).toLowerCase().trim();
    const channel = ["sms", "email", "both"].includes(channelRaw) ? channelRaw : "both";

    return {
      id: `RES-${String(i + 1).padStart(3, "0")}`,
      name: String(get("name")).trim() || `Guest ${i + 1}`,
      email: String(get("email")).trim(),
      phone: String(get("phone")).trim(),
      service: String(get("service")).trim() || "Reservation",
      date: dateWithTime || new Date(),
      guests: parseInt(get("guests")) || 1,
      status: "unconfirmed",
      channel,
      messageSent: false,
      messageTime: null,
      notes: String(get("notes")).trim(),
    };
  }).filter((r) => r.name && r.date);
}

// ─── Reducer ─────────────────────────────────────────────────────
function reducer(state, action) {
  switch (action.type) {
    case "SET_DOCK":
      return { ...state, currentDock: action.payload, view: "reservations", reservations: [], selected: new Set(), selectedId: null };
    case "SWITCH_DOCK":
      return { ...state, currentDock: null, view: "dock-select", reservations: [], selected: new Set(), selectedId: null, smsDrawer: null, smsCompose: null };
    case "SET_FILTER":
      return { ...state, filter: action.payload };
    case "SET_SEARCH":
      return { ...state, search: action.payload };
    case "SEND_REMINDER": {
      const updated = state.reservations.map((r) => {
        if (r.id !== action.payload) return r;
        const dateStr = r.date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
        const timeStr = r.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const outbound = {
          from: "system",
          text: `Hi ${r.name.split(" ")[0]}! This is a reminder about your upcoming ${r.service} on ${dateStr} at ${timeStr} for ${r.guests} guest(s).\n\nReply:\n• CONFIRM to confirm\n• CANCEL to cancel\n• TIME [new time] to update your arrival (e.g. TIME 7:30 PM)`,
          time: new Date(),
        };
        return { ...r, messageSent: true, messageTime: new Date(), status: r.status === "unconfirmed" ? "pending" : r.status, smsLog: [outbound] };
      });
      return { ...state, reservations: updated };
    }
    case "SEND_ALL_REMINDERS": {
      const updated = state.reservations.map((r) => {
        if (r.messageSent) return r;
        const dateStr = r.date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
        const timeStr = r.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const outbound = {
          from: "system",
          text: `Hi ${r.name.split(" ")[0]}! This is a reminder about your upcoming ${r.service} on ${dateStr} at ${timeStr} for ${r.guests} guest(s).\n\nReply:\n• CONFIRM to confirm\n• CANCEL to cancel\n• TIME [new time] to update your arrival (e.g. TIME 7:30 PM)`,
          time: new Date(),
        };
        return { ...r, messageSent: true, messageTime: new Date(), status: "pending", smsLog: [outbound] };
      });
      return { ...state, reservations: updated, showToast: "All SMS confirmations sent!" };
    }
    case "UPDATE_STATUS": {
      const updated = state.reservations.map((r) =>
        r.id === action.payload.id ? { ...r, status: action.payload.status } : r
      );
      return { ...state, reservations: updated };
    }
    case "TOGGLE_DETAIL":
      return { ...state, selectedId: state.selectedId === action.payload ? null : action.payload };
    case "SET_VIEW":
      return { ...state, view: action.payload };
    case "DISMISS_TOAST":
      return { ...state, showToast: null };
    case "LOAD_DATA":
      return { ...state, reservations: action.payload, selected: new Set(), showToast: `${action.payload.length} reservations imported!` };
    case "LOAD_DATA_SILENT":
      return { ...state, reservations: action.payload };
    case "SHOW_TOAST":
      return { ...state, showToast: action.payload };
    case "CLEAR_DATA":
      return { ...state, reservations: [], selected: new Set(), selectedId: null };
    case "OPEN_SMS":
      return { ...state, smsDrawer: action.payload };
    case "CLOSE_SMS":
      return { ...state, smsDrawer: null };
    case "OPEN_COMPOSE":
      return { ...state, smsCompose: action.payload };
    case "CLOSE_COMPOSE":
      return { ...state, smsCompose: null };
    case "SIMULATE_REPLY": {
      const { id, reply } = action.payload;
      const updated = state.reservations.map((r) => {
        if (r.id !== id) return r;
        const newLog = [...(r.smsLog || []), { from: "member", text: reply, time: new Date() }];
        const replyLower = reply.toLowerCase().trim();
        // Parse CONFIRM
        if (replyLower === "confirm" || replyLower === "yes" || replyLower === "c") {
          newLog.push({ from: "system", text: "Thank you! Your reservation is confirmed. We look forward to seeing you!", time: new Date() });
          return { ...r, smsLog: newLog, status: "confirmed" };
        }
        // Parse CANCEL
        if (replyLower === "cancel" || replyLower === "no") {
          newLog.push({ from: "system", text: "Your reservation has been cancelled. If you change your mind, please call us to rebook.", time: new Date() });
          return { ...r, smsLog: newLog, status: "cancelled" };
        }
        // Parse TIME change — e.g. "TIME 7:30 PM" or "time 19:00"
        const timeMatch = replyLower.match(/^time\s+(\d{1,2}):?(\d{2})?\s*(am|pm)?$/i);
        if (timeMatch) {
          let h = parseInt(timeMatch[1]);
          const m = parseInt(timeMatch[2] || "0");
          const ampm = timeMatch[3];
          if (ampm && ampm.toLowerCase() === "pm" && h < 12) h += 12;
          if (ampm && ampm.toLowerCase() === "am" && h === 12) h = 0;
          const newDate = new Date(r.date);
          newDate.setHours(h, m, 0, 0);
          const timeStr = newDate.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          newLog.push({ from: "system", text: `Got it! Your arrival time has been updated to ${timeStr}. Please reply CONFIRM to finalize.`, time: new Date() });
          return { ...r, smsLog: newLog, date: newDate, originalTime: r.originalTime || r.date, timeUpdated: true };
        }
        // Unrecognized
        newLog.push({ from: "system", text: "Sorry, I didn't understand that. Please reply CONFIRM, CANCEL, or TIME followed by your new time (e.g. TIME 7:30 PM).", time: new Date() });
        return { ...r, smsLog: newLog };
      });
      return { ...state, reservations: updated };
    }
    case "SEND_SMS": {
      const { id } = action.payload;
      const updated = state.reservations.map((r) => {
        if (r.id !== id) return r;
        const dateStr = r.date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
        const timeStr = r.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const outbound = {
          from: "system",
          text: `Hi ${r.name.split(" ")[0]}! This is a reminder about your upcoming ${r.service} on ${dateStr} at ${timeStr} for ${r.guests} guest(s).\n\nReply:\n• CONFIRM to confirm\n• CANCEL to cancel\n• TIME [new time] to update your arrival (e.g. TIME 7:30 PM)`,
          time: new Date(),
        };
        return { ...r, messageSent: true, messageTime: new Date(), status: r.status === "unconfirmed" ? "pending" : r.status, smsLog: [outbound] };
      });
      return { ...state, reservations: updated, showToast: "SMS confirmation sent!" };
    }
    // ─── Bulk Selection Actions ─────────────────────────────
    case "TOGGLE_SELECT": {
      const next = new Set(state.selected);
      if (next.has(action.payload)) next.delete(action.payload);
      else next.add(action.payload);
      return { ...state, selected: next };
    }
    case "SELECT_ALL_FILTERED": {
      const next = new Set(state.selected);
      action.payload.forEach((id) => next.add(id));
      return { ...state, selected: next };
    }
    case "DESELECT_ALL":
      return { ...state, selected: new Set() };
    case "BULK_CONFIRM": {
      const updated = state.reservations.map((r) =>
        state.selected.has(r.id) && r.status !== "cancelled"
          ? { ...r, status: "confirmed" }
          : r
      );
      const count = [...state.selected].filter(id => {
        const r = state.reservations.find(res => res.id === id);
        return r && r.status !== "cancelled";
      }).length;
      return { ...state, reservations: updated, selected: new Set(), showToast: `${count} reservation${count !== 1 ? "s" : ""} confirmed!` };
    }
    case "BULK_CANCEL": {
      const updated = state.reservations.map((r) =>
        state.selected.has(r.id) ? { ...r, status: "cancelled" } : r
      );
      const count = state.selected.size;
      return { ...state, reservations: updated, selected: new Set(), showToast: `${count} reservation${count !== 1 ? "s" : ""} cancelled.` };
    }
    case "BULK_SEND": {
      const updated = state.reservations.map((r) => {
        if (!state.selected.has(r.id) || r.messageSent) return r;
        const dateStr = r.date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
        const timeStr = r.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        const outbound = {
          from: "system",
          text: `Hi ${r.name.split(" ")[0]}! This is a reminder about your upcoming ${r.service} on ${dateStr} at ${timeStr} for ${r.guests} guest(s).\n\nReply:\n• CONFIRM to confirm\n• CANCEL to cancel\n• TIME [new time] to update your arrival (e.g. TIME 7:30 PM)`,
          time: new Date(),
        };
        return { ...r, messageSent: true, messageTime: new Date(), status: r.status === "unconfirmed" ? "pending" : r.status, smsLog: [outbound] };
      });
      const count = [...state.selected].filter(id => {
        const r = state.reservations.find(res => res.id === id);
        return r && !r.messageSent;
      }).length;
      return { ...state, reservations: updated, selected: new Set(), showToast: `Reminders sent to ${count} guest${count !== 1 ? "s" : ""}!` };
    }
    default:
      return state;
  }
}

function Toast({ message, onDismiss }) {
  useEffect(() => {
    const t = setTimeout(onDismiss, 3000);
    return () => clearTimeout(t);
  }, [onDismiss]);

  return (
    <div style={{
      position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)",
      background: palette.green, color: "#fff", padding: "14px 28px",
      borderRadius: 12, fontFamily: "'Open Sans', sans-serif", fontSize: 14,
      fontWeight: 500, boxShadow: "0 8px 32px rgba(61,139,110,0.3)",
      zIndex: 9999, animation: "slideUp 0.3s ease-out",
      display: "flex", alignItems: "center", gap: 10,
    }}>
      <span style={{ fontSize: 18 }}>✓</span> {message}
    </div>
  );
}

// ─── SMS Compose Modal ──────────────────────────────────────────
function SmsComposeModal({ compose, reservations, dispatch, onSend }) {
  const { id, mode } = compose;

  // Build default message for single or first reservation
  const res = mode === "single" ? reservations.find((r) => r.id === id) : null;
  const buildDefault = (r) => {
    const dateStr = new Date(r.date).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    const timeStr = new Date(r.date).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    return (
      `Hi ${r.name.split(" ")[0]}! This is a reminder about your upcoming ${r.service} on ${dateStr} at ${timeStr} for ${r.guests} guest(s).\n\n` +
      `Reply:\n• CONFIRM to confirm\n• CANCEL to cancel\n• TIME [new time] to update your arrival (e.g. TIME 7:30 PM)`
    );
  };

  const defaultBody = res ? buildDefault(res) : buildDefault(reservations.find((r) => !r.messageSent) || reservations[0]);
  const [body, setBody] = useState(defaultBody);
  const [sending, setSending] = useState(false);

  const charCount = body.length;
  const segments = Math.ceil(charCount / 160);

  // For bulk, figure out targets
  const bulkIds = mode === "bulk" ? (Array.isArray(id) ? id : []) : [];
  const bulkTargets = bulkIds.map((bid) => reservations.find((r) => r.id === bid)).filter(Boolean);
  const recipientCount = mode === "single" ? 1 : bulkTargets.length;

  const handleSend = async () => {
    setSending(true);
    if (mode === "single") {
      await onSend({ type: "SEND_SMS_CUSTOM", id, body });
    } else {
      await onSend({ type: "SEND_BULK_CUSTOM", ids: bulkIds, body });
    }
    setSending(false);
    dispatch({ type: "CLOSE_COMPOSE" });
  };

  return (
    <>
      <div
        onClick={() => dispatch({ type: "CLOSE_COMPOSE" })}
        style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.4)", zIndex: 1100,
          animation: "fadeIn 0.2s ease-out",
        }}
      />
      <div style={{
        position: "fixed", top: "50%", left: "50%",
        transform: "translate(-50%, -50%)",
        width: "90%", maxWidth: 540,
        background: palette.card, borderRadius: 20,
        boxShadow: "0 24px 80px rgba(0,0,0,0.2)",
        zIndex: 1101, animation: "fadeIn 0.2s ease-out",
        overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{
          padding: "20px 24px 16px",
          borderBottom: `1px solid ${palette.border}`,
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div>
            <div style={{
              fontSize: 18, fontWeight: 700, color: palette.dark,
              fontFamily: "'Montserrat', sans-serif",
            }}>Compose SMS</div>
            <div style={{
              fontSize: 12, color: palette.muted, marginTop: 2,
              fontFamily: "'Open Sans', sans-serif",
            }}>
              {mode === "single"
                ? `To: ${res?.name} · ${res?.phone}`
                : `To: ${recipientCount} recipient${recipientCount !== 1 ? "s" : ""}`}
            </div>
          </div>
          <button
            onClick={() => dispatch({ type: "CLOSE_COMPOSE" })}
            style={{
              background: "none", border: "none", fontSize: 24,
              color: palette.muted, cursor: "pointer", lineHeight: 1,
            }}
          >×</button>
        </div>

        {/* Recipient pills for bulk */}
        {mode === "bulk" && (
          <div style={{
            padding: "12px 24px", borderBottom: `1px solid ${palette.border}`,
            display: "flex", flexWrap: "wrap", gap: 6, maxHeight: 80, overflowY: "auto",
          }}>
            {bulkTargets.map((r) => (
              <span key={r.id} style={{
                padding: "3px 10px", borderRadius: 12, fontSize: 11,
                background: palette.accentLight, color: palette.accent,
                fontWeight: 500, fontFamily: "'Open Sans', sans-serif",
              }}>{r.name}</span>
            ))}
          </div>
        )}

        {/* Message Editor */}
        <div style={{ padding: "16px 24px" }}>
          <div style={{
            fontSize: 10, color: palette.muted, fontWeight: 600, letterSpacing: 0.8,
            textTransform: "uppercase", marginBottom: 8, fontFamily: "'Open Sans', sans-serif",
          }}>Message</div>
          <textarea
            value={body}
            onChange={(e) => setBody(e.target.value)}
            style={{
              width: "100%", minHeight: 180, padding: 16, borderRadius: 12,
              border: `1.5px solid ${palette.border}`, background: "#F5F8FB",
              fontSize: 13, lineHeight: 1.7, fontFamily: "'Open Sans', sans-serif",
              color: palette.dark, resize: "vertical", outline: "none",
              boxSizing: "border-box",
            }}
            onFocus={(e) => e.target.style.borderColor = palette.accent}
            onBlur={(e) => e.target.style.borderColor = palette.border}
          />
          <div style={{
            display: "flex", justifyContent: "space-between", marginTop: 8,
            fontSize: 11, fontFamily: "'Open Sans', sans-serif",
          }}>
            <span style={{ color: palette.muted }}>
              {charCount} characters · {segments} segment{segments !== 1 ? "s" : ""}
            </span>
            <button
              onClick={() => setBody(defaultBody)}
              style={{
                background: "none", border: "none", color: palette.accent,
                fontSize: 11, fontWeight: 600, cursor: "pointer",
                fontFamily: "'Open Sans', sans-serif",
              }}
            >Reset to default</button>
          </div>

          {/* Tip */}
          <div style={{
            marginTop: 12, padding: "10px 14px", borderRadius: 10,
            background: palette.amberLight, fontSize: 11, lineHeight: 1.5,
            color: palette.amber, fontFamily: "'Open Sans', sans-serif",
          }}>
            <span style={{ fontWeight: 700 }}>Tip:</span> Keep the reply instructions (CONFIRM / CANCEL / TIME) so the system can process member responses automatically.
          </div>
        </div>

        {/* Footer */}
        <div style={{
          padding: "16px 24px", borderTop: `1px solid ${palette.border}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <button
            onClick={() => dispatch({ type: "CLOSE_COMPOSE" })}
            style={{
              padding: "10px 20px", borderRadius: 10,
              border: `1.5px solid ${palette.border}`, background: "transparent",
              color: palette.muted, fontSize: 13, fontWeight: 600,
              cursor: "pointer", fontFamily: "'Open Sans', sans-serif",
            }}
          >Cancel</button>
          <button
            onClick={handleSend}
            disabled={sending || !body.trim()}
            style={{
              padding: "10px 28px", borderRadius: 10, border: "none",
              background: sending || !body.trim() ? palette.border : palette.accent,
              color: sending || !body.trim() ? palette.muted : "#fff",
              fontSize: 13, fontWeight: 600,
              cursor: sending || !body.trim() ? "default" : "pointer",
              fontFamily: "'Open Sans', sans-serif",
              boxShadow: sending || !body.trim() ? "none" : `0 4px 16px ${palette.accent}40`,
              display: "flex", alignItems: "center", gap: 8,
            }}
          >
            {sending ? "Sending..." : `Send${recipientCount > 1 ? ` to ${recipientCount}` : ""}`} →
          </button>
        </div>
      </div>
    </>
  );
}

// ─── SMS Drawer ─────────────────────────────────────────────────
function SmsDrawer({ reservation, dispatch }) {
  const [replyText, setReplyText] = useState("");
  const scrollRef = useRef(null);
  const res = reservation;
  const log = res.smsLog || [];

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [log.length]);

  const handleSend = () => {
    const text = replyText.trim();
    if (!text) return;
    dispatch({ type: "SIMULATE_REPLY", payload: { id: res.id, reply: text } });
    setReplyText("");
  };

  const dateStr = res.date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const timeStr = res.date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

                  fontSize: 10, marginTop: 4, textAlign: "right",
                  color: msg.from === "system" ? palette.muted : "rgba(255,255,255,0.7)",
                }}>
                  {new Date(msg.time).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      {/* Quick Reply Chips */}
      {res.messageSent && (
        <div style={{
          padding: "10px 16px 4px", background: palette.card,
          borderTop: `1px solid ${palette.border}`,
          display: "flex", gap: 6, flexWrap: "wrap", flexShrink: 0,
        }}>
          <div style={{ fontSize: 10, color: palette.muted, fontFamily: "'Open Sans', sans-serif", width: "100%", marginBottom: 2 }}>
            Simulate member reply:
          </div>
          {["CONFIRM", "CANCEL", "TIME 7:30 PM", "TIME 6:00 PM"].map((chip) => (
            <button
              key={chip}
              onClick={() => {
                dispatch({ type: "SIMULATE_REPLY", payload: { id: res.id, reply: chip } });
              }}
              style={{
                padding: "6px 12px", borderRadius: 20,
                border: `1.5px solid ${chip === "CONFIRM" ? palette.green : chip === "CANCEL" ? palette.red : palette.blue}`,
                background: "transparent",
                color: chip === "CONFIRM" ? palette.green : chip === "CANCEL" ? palette.red : palette.blue,
                fontSize: 11, fontWeight: 600, cursor: "pointer",
                fontFamily: "'Open Sans', sans-serif", transition: "all 0.15s",
              }}
            >{chip}</button>
          ))}
        </div>
      )}

      {/* Reply Input */}
      {res.messageSent && (
        <div style={{
          padding: "12px 16px", background: palette.card,
          borderTop: `1px solid ${palette.border}`,
          display: "flex", gap: 10, alignItems: "center", flexShrink: 0,
        }}>
          <input
            type="text"
            placeholder="Type a member reply to simulate..."
            value={replyText}
            onChange={(e) => setReplyText(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleSend()}
            style={{
              flex: 1, padding: "10px 16px", borderRadius: 24,
              border: `1.5px solid ${palette.border}`, background: "#F0F4F8",
              fontSize: 13, fontFamily: "'Open Sans', sans-serif",
              color: palette.dark, outline: "none",
            }}
            onFocus={(e) => e.target.style.borderColor = palette.accent}
            onBlur={(e) => e.target.style.borderColor = palette.border}
          />
          <button
            onClick={handleSend}
            style={{
              width: 40, height: 40, borderRadius: "50%", border: "none",
              background: replyText.trim() ? palette.accent : palette.border,
              color: "#fff", fontSize: 16, cursor: replyText.trim() ? "pointer" : "default",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background 0.15s", flexShrink: 0,
            }}
          >↑</button>
        </div>
      )}
    </div>
  );
}

// ─── Upload Panel ────────────────────────────────────────────────
function UploadPanel({ dispatch }) {
  const [step, setStep] = useState("upload"); // upload | mapping | preview
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState("");
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [error, setError] = useState("");
  const fileInputRef = useRef(null);

  const processFile = useCallback((file) => {
    setError("");
    if (!file) return;
    const validTypes = [
      "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      "application/vnd.ms-excel",
      "text/csv",
    ];
    const ext = file.name.split(".").pop().toLowerCase();
    if (!validTypes.includes(file.type) && !["xlsx", "xls", "csv"].includes(ext)) {
      setError("Please upload an Excel (.xlsx, .xls) or CSV file.");
      return;
    }
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array", cellDates: true });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        if (json.length === 0) {
          setError("The file appears to be empty. Please check your data.");
          return;
        }
        const hdrs = Object.keys(json[0]);
        setHeaders(hdrs);
        setRows(json);
        const autoMap = autoMapColumns(hdrs);
        setMapping(autoMap);
        setStep("mapping");
      } catch (err) {
        setError("Could not read the file. Please make sure it's a valid Excel or CSV file.");
      }
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processFile(file);
  }, [processFile]);

  const handleFileInput = useCallback((e) => {
    const file = e.target.files?.[0];
    if (file) processFile(file);
  }, [processFile]);

  const handleImport = () => {
    if (!mapping.name || !mapping.date) {
      setError("Guest Name and Date are required fields. Please map them before importing.");
      return;
    }
    const reservations = rowsToReservations(rows, mapping);
    if (reservations.length === 0) {
      setError("No valid reservations found. Check that your date and name columns contain data.");
      return;
    }
    dispatch({ type: "LOAD_DATA", payload: reservations });
  };

  const mappedCount = EXPECTED_FIELDS.filter((f) => mapping[f.key]).length;
  const requiredMapped = EXPECTED_FIELDS.filter((f) => f.required && mapping[f.key]).length;
  const requiredTotal = EXPECTED_FIELDS.filter((f) => f.required).length;

  // ── Upload Step ──
  if (step === "upload") {
    return (
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 0" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{
            width: 64, height: 64, borderRadius: 20, margin: "0 auto 16px",
            background: `linear-gradient(135deg, ${palette.accentLight}, ${palette.greenLight})`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 28,
          }}>📊</div>
          <h2 style={{
            fontSize: 26, fontWeight: 700, color: palette.dark,
            fontFamily: "'Montserrat', sans-serif", marginBottom: 8,
          }}>Import Reservations</h2>
          <p style={{
            fontSize: 14, color: palette.muted, fontFamily: "'Open Sans', sans-serif",
            lineHeight: 1.6, maxWidth: 420, margin: "0 auto",
          }}>
            Upload an Excel or CSV file with your upcoming reservation data.
            We'll auto-detect your columns and let you review before importing.
          </p>
        </div>

        <div
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={handleDrop}
          onClick={() => fileInputRef.current?.click()}
          style={{
            border: `2px dashed ${dragOver ? palette.accent : palette.border}`,
            borderRadius: 20, padding: "52px 32px", textAlign: "center",
            background: dragOver ? palette.accentLight + "40" : palette.card,
            cursor: "pointer", transition: "all 0.2s",
            boxShadow: dragOver ? palette.shadowHover : palette.shadow,
          }}
        >
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls,.csv"
            onChange={handleFileInput}
            style={{ display: "none" }}
          />
          <div style={{
            fontSize: 44, marginBottom: 16, opacity: dragOver ? 1 : 0.6,
            transition: "opacity 0.2s",
          }}>{dragOver ? "📥" : "📄"}</div>
          <div style={{
            fontSize: 16, fontWeight: 600, color: palette.dark,
            fontFamily: "'Open Sans', sans-serif", marginBottom: 6,
          }}>
            {dragOver ? "Drop your file here" : "Drag & drop your file here"}
          </div>
          <div style={{
            fontSize: 13, color: palette.muted, fontFamily: "'Open Sans', sans-serif",
          }}>
            or <span style={{ color: palette.accent, fontWeight: 600 }}>click to browse</span> · .xlsx, .xls, .csv
          </div>
        </div>

        {error && (
          <div style={{
            marginTop: 16, padding: "12px 18px", borderRadius: 12,
            background: palette.redLight, color: palette.red,
            fontSize: 13, fontFamily: "'Open Sans', sans-serif",
            border: `1px solid ${palette.red}20`,
          }}>⚠ {error}</div>
        )}

        {/* Expected format hint */}
        <div style={{
          marginTop: 28, background: palette.card, borderRadius: 14,
          padding: "18px 22px", border: `1px solid ${palette.border}`,
          boxShadow: palette.shadow,
        }}>
          <div style={{
            fontSize: 10, color: palette.muted, fontWeight: 600, letterSpacing: 1,
            textTransform: "uppercase", marginBottom: 10, fontFamily: "'Open Sans', sans-serif",
          }}>Expected Columns</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {EXPECTED_FIELDS.map((f) => (
              <span key={f.key} style={{
                padding: "4px 12px", borderRadius: 8, fontSize: 12,
                fontFamily: "'Open Sans', sans-serif", fontWeight: 500,
                background: f.required ? palette.accentLight : "#F0EEEA",
                color: f.required ? palette.accent : palette.muted,
              }}>
                {f.label}{f.required ? " *" : ""}
              </span>
            ))}
          </div>
          <div style={{
            fontSize: 11, color: palette.muted, marginTop: 10,
            fontFamily: "'Open Sans', sans-serif",
          }}>
            * Required fields. Other columns are optional — we'll auto-detect matching headers.
          </div>
        </div>
      </div>
    );
  }

  // ── Mapping Step ──
  if (step === "mapping") {
    return (
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 0" }}>
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <button
              onClick={() => setStep("upload")}
              style={{
                background: "none", border: "none", color: palette.muted,
                fontSize: 13, cursor: "pointer", fontFamily: "'Open Sans', sans-serif",
                display: "flex", alignItems: "center", gap: 4,
              }}
            >← Back</button>
          </div>
          <h2 style={{
            fontSize: 24, fontWeight: 700, color: palette.dark,
            fontFamily: "'Montserrat', sans-serif", marginBottom: 6,
          }}>Map Your Columns</h2>
          <p style={{
            fontSize: 13, color: palette.muted, fontFamily: "'Open Sans', sans-serif",
          }}>
            <span style={{ fontWeight: 600, color: palette.dark }}>{fileName}</span> · {rows.length} rows found · {mappedCount} of {EXPECTED_FIELDS.length} fields mapped
          </p>
        </div>

        {/* Progress indicator */}
        <div style={{
          height: 4, borderRadius: 2, background: palette.border, marginBottom: 24, overflow: "hidden",
        }}>
          <div style={{
            height: "100%", borderRadius: 2,
            background: requiredMapped >= requiredTotal ? palette.green : palette.amber,
            width: `${(mappedCount / EXPECTED_FIELDS.length) * 100}%`,
            transition: "width 0.3s, background 0.3s",
          }} />
        </div>

        {error && (
          <div style={{
            marginBottom: 16, padding: "12px 18px", borderRadius: 12,
            background: palette.redLight, color: palette.red,
            fontSize: 13, fontFamily: "'Open Sans', sans-serif",
          }}>⚠ {error}</div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {EXPECTED_FIELDS.map((field) => (
            <div key={field.key} style={{
              background: palette.card, borderRadius: 12, padding: "14px 18px",
              border: `1px solid ${field.required && !mapping[field.key] ? palette.amber + "60" : palette.border}`,
              display: "flex", alignItems: "center", gap: 16,
              boxShadow: palette.shadow,
            }}>
              <div style={{ flex: 1, minWidth: 140 }}>
                <div style={{
                  fontSize: 13, fontWeight: 600, color: palette.dark,
                  fontFamily: "'Open Sans', sans-serif",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                  {field.label}
                  {field.required && (
                    <span style={{
                      fontSize: 9, padding: "2px 6px", borderRadius: 4,
                      background: mapping[field.key] ? palette.greenLight : palette.amberLight,
                      color: mapping[field.key] ? palette.green : palette.amber,
                      fontWeight: 700,
                    }}>{mapping[field.key] ? "MAPPED" : "REQUIRED"}</span>
                  )}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: palette.muted, fontSize: 16 }}>→</span>
                <select
                  value={mapping[field.key] || ""}
                  onChange={(e) => {
                    const val = e.target.value;
                    setMapping((prev) => {
                      const next = { ...prev };
                      if (val) next[field.key] = val;
                      else delete next[field.key];
                      return next;
                    });
                    setError("");
                  }}
                  style={{
                    padding: "8px 14px", borderRadius: 8,
                    border: `1.5px solid ${mapping[field.key] ? palette.green + "60" : palette.border}`,
                    background: mapping[field.key] ? palette.greenLight + "40" : palette.card,
                    fontSize: 13, fontFamily: "'Open Sans', sans-serif",
                    color: mapping[field.key] ? palette.dark : palette.muted,
                    minWidth: 200, outline: "none", cursor: "pointer",
                    appearance: "auto",
                  }}
                >
                  <option value="">— Skip —</option>
                  {headers.map((h) => (
                    <option key={h} value={h}>{h}</option>
                  ))}
                </select>
              </div>
            </div>
          ))}
        </div>

        {/* Preview + Import */}
        <div style={{ marginTop: 24, display: "flex", gap: 12, justifyContent: "space-between", alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ fontSize: 12, color: palette.muted, fontFamily: "'Open Sans', sans-serif" }}>
            Preview: first {Math.min(3, rows.length)} of {rows.length} rows
          </div>
          <button
            onClick={handleImport}
            style={{
              padding: "12px 32px", borderRadius: 12, border: "none",
              background: requiredMapped >= requiredTotal ? palette.green : palette.border,
              color: requiredMapped >= requiredTotal ? "#fff" : palette.muted,
              fontSize: 14, fontWeight: 600, cursor: requiredMapped >= requiredTotal ? "pointer" : "default",
              fontFamily: "'Open Sans', sans-serif",
              boxShadow: requiredMapped >= requiredTotal ? `0 4px 16px ${palette.green}40` : "none",
              transition: "all 0.2s",
            }}
          >
            Import {rows.length} Reservations →
          </button>
        </div>

        {/* Mini Preview Table */}
        <div style={{
          marginTop: 16, background: palette.card, borderRadius: 14,
          border: `1px solid ${palette.border}`, overflow: "hidden",
          boxShadow: palette.shadow,
        }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'Open Sans', sans-serif" }}>
              <thead>
                <tr>
                  {EXPECTED_FIELDS.filter((f) => mapping[f.key]).map((f) => (
                    <th key={f.key} style={{
                      padding: "10px 14px", textAlign: "left", fontWeight: 600,
                      color: palette.muted, borderBottom: `1px solid ${palette.border}`,
                      background: "#F5F8FB", fontSize: 11, letterSpacing: 0.3,
                      textTransform: "uppercase", whiteSpace: "nowrap",
                    }}>{f.label}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.slice(0, 3).map((row, i) => (
                  <tr key={i}>
                    {EXPECTED_FIELDS.filter((f) => mapping[f.key]).map((f) => (
                      <td key={f.key} style={{
                        padding: "10px 14px", color: palette.dark,
                        borderBottom: `1px solid ${palette.border}`,
                        whiteSpace: "nowrap", maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis",
                      }}>
                        {String(row[mapping[f.key]] ?? "—")}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ─── Main App ────────────────────────────────────────────────────
function ReservationDashboard({ onLogout }) {
  const [state, dispatch] = useReducer(reducer, {
    reservations: [],
    filter: "all",
    search: "",
    selectedId: null,
    selected: new Set(),
    smsDrawer: null,
    smsCompose: null, // { id, body, mode: "single"|"bulk" }
    currentDock: null, // dock id
    view: "dock-select", // start at dock selection
    showToast: null,
  });

  const [apiStatus, setApiStatus] = useState(api.isLive() ? "connecting" : "local"); // local | connecting | connected | error

  // Poll the backend API for reservation updates when in live mode
  useEffect(() => {
    if (!api.isLive() || !state.currentDock) return;

    let active = true;

    const checkHealth = async () => {
      try {
        const data = await api.healthCheck();
        if (active) setApiStatus(data.twilioConfigured ? "connected" : "connected-no-twilio");
      } catch {
        if (active) setApiStatus("error");
      }
    };
    checkHealth();

    const poll = async () => {
      try {
        const data = await api.fetchReservations(state.currentDock);
        if (active && data.reservations) {
          const parsed = data.reservations.map((r) => ({
            ...r,
            date: new Date(r.date),
            messageTime: r.messageTime ? new Date(r.messageTime) : null,
            smsLog: (r.smsLog || []).map((m) => ({ ...m, time: new Date(m.time) })),
          }));
          dispatch({ type: "LOAD_DATA_SILENT", payload: parsed });
        }
      } catch { /* silently fail */ }
    };

    const interval = setInterval(poll, 5000);
    return () => { active = false; clearInterval(interval); };
  }, [state.currentDock]);

  const filtered = state.reservations
    .filter((r) => state.filter === "all" || r.status === state.filter)
    .filter((r) =>
      state.search === "" ||
      r.name.toLowerCase().includes(state.search.toLowerCase()) ||
      r.id.toLowerCase().includes(state.search.toLowerCase()) ||
      r.service.toLowerCase().includes(state.search.toLowerCase())
    )
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  const counts = {
    all: state.reservations.length,
    confirmed: state.reservations.filter((r) => r.status === "confirmed").length,
    pending: state.reservations.filter((r) => r.status === "pending").length,
    unconfirmed: state.reservations.filter((r) => r.status === "unconfirmed").length,
    cancelled: state.reservations.filter((r) => r.status === "cancelled").length,
  };

  const unsent = state.reservations.filter((r) => !r.messageSent).length;

  // Helper to refresh data from server
  const refreshFromServer = async () => {
    if (!state.currentDock) return;
    try {
      const data = await api.fetchReservations(state.currentDock);
      if (data.reservations) dispatch({ type: "LOAD_DATA_SILENT", payload: data.reservations.map((r) => ({ ...r, date: new Date(r.date), messageTime: r.messageTime ? new Date(r.messageTime) : null, smsLog: (r.smsLog || []).map((m) => ({ ...m, time: new Date(m.time) })) })) });
    } catch { /* silently fail */ }
  };

  // Wrap dispatch to intercept SMS actions and route to API when live
  const liveDispatch = useCallback(async (action) => {
    if (!api.isLive()) {
      // In simulation mode, SEND_SMS and BULK_SEND still open compose
      if (action.type === "SEND_SMS") {
        dispatch({ type: "OPEN_COMPOSE", payload: { id: action.payload.id, mode: "single" } });
        return;
      }
      if (action.type === "BULK_SEND") {
        dispatch({ type: "OPEN_COMPOSE", payload: { id: [...state.selected], mode: "bulk" } });
        return;
      }
      if (action.type === "SEND_ALL_REMINDERS") {
        const unsentIds = state.reservations.filter((r) => !r.messageSent).map((r) => r.id);
        dispatch({ type: "OPEN_COMPOSE", payload: { id: unsentIds, mode: "bulk" } });
        return;
      }
      dispatch(action);
      return;
    }

    switch (action.type) {
      case "SEND_SMS": {
        // Open compose modal instead of sending directly
        dispatch({ type: "OPEN_COMPOSE", payload: { id: action.payload.id, mode: "single" } });
        break;
      }
      case "SEND_SMS_CUSTOM": {
        // Actually send with custom body
        try {
          const result = await api.sendSms(action.id, action.body, state.currentDock);
          if (result.success) {
            dispatch({ type: "SHOW_TOAST", payload: "SMS sent via Twilio!" });
            await refreshFromServer();
          } else {
            dispatch({ type: "SHOW_TOAST", payload: `Failed: ${result.error}` });
          }
        } catch (err) {
          dispatch({ type: "SHOW_TOAST", payload: "Network error sending SMS" });
        }
        break;
      }
      case "SEND_ALL_REMINDERS": {
        // Open compose modal for all unsent
        const unsentIds = state.reservations.filter((r) => !r.messageSent).map((r) => r.id);
        dispatch({ type: "OPEN_COMPOSE", payload: { id: unsentIds, mode: "bulk" } });
        break;
      }
      case "BULK_SEND": {
        // Open compose modal for selected
        dispatch({ type: "OPEN_COMPOSE", payload: { id: [...state.selected], mode: "bulk" } });
        break;
      }
      case "SEND_BULK_CUSTOM": {
        // Actually send bulk with custom body
        try {
          const result = await api.sendBulk(action.ids, state.currentDock);
          if (result.success) {
            dispatch({ type: "SHOW_TOAST", payload: `${result.sent} SMS sent via Twilio!` });
            dispatch({ type: "DESELECT_ALL" });
            await refreshFromServer();
          }
        } catch {
          dispatch({ type: "SHOW_TOAST", payload: "Network error sending bulk SMS" });
        }
        break;
      }
      case "UPDATE_STATUS": {
        try {
          await api.updateStatus(action.payload.id, action.payload.status, state.currentDock);
          dispatch(action);
        } catch {
          dispatch(action); // fallback to local
        }
        break;
      }
      case "LOAD_DATA": {
        // Also send to backend
        try {
          await api.importReservations(action.payload, state.currentDock);
        } catch { /* continue with local */ }
        dispatch(action);
        break;
      }
      default:
        dispatch(action);
    }
  }, [state.selected, state.reservations]);

                  : palette.blueLight,

                    : apiStatus === "connecting" ? palette.amber
                    : palette.blue,

          </div>

                padding: "10px 22px", borderRadius: 10, border: "none",

                color: state.view === "reservations" ? "#fff" : palette.muted,

            <button

                color: state.view === "automation" ? "#fff" : palette.muted,

                fontFamily: "'Open Sans', sans-serif", transition: "all 0.15s",

                background: state.view === "upload" ? palette.accentLight : "transparent",

                  background: "transparent",
                  color: palette.muted,
                  fontSize: 12, fontWeight: 600, cursor: "pointer",
                  fontFamily: "'Open Sans', sans-serif", transition: "all 0.15s",
                  display: "flex", alignItems: "center", gap: 6,
                }}

                <span style={{ fontSize: 13 }}>⚓</span> {DOCKS.find((d) => d.id === state.currentDock)?.name || "Switch Dock"}

                padding: "10px 18px", borderRadius: 10,
                border: `1.5px solid ${palette.border}`,
                background: "transparent",
                color: palette.muted,
                fontSize: 12, fontWeight: 600, cursor: "pointer",

            <div style={{
              fontSize: 13, color: palette.accent, fontWeight: 700,
              letterSpacing: 2, textTransform: "uppercase", marginBottom: 12,
              fontFamily: "'Open Sans', sans-serif",

            <div style={{
              fontSize: 22, fontWeight: 700, color: palette.dark,
              fontFamily: "'Montserrat', sans-serif", marginBottom: 32,
              textAlign: "center",
            }}>Which dock are you managing today?</div>

              display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))",

                <button
                  key={dock.id}
                  onClick={() => dispatch({ type: "SET_DOCK", payload: dock.id })}
                  style={{
                    padding: "28px 24px", borderRadius: 14,
                    border: `2px solid ${palette.border}`,
                    background: palette.card,
                    cursor: "pointer", transition: "all 0.2s",
                    textAlign: "left",
                    boxShadow: palette.shadow,
                  }}
                  onMouseEnter={(e) => {
                    e.currentTarget.style.borderColor = palette.accent;
                    e.currentTarget.style.boxShadow = palette.shadowHover;
                    e.currentTarget.style.transform = "translateY(-2px)";
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.borderColor = palette.border;
                    e.currentTarget.style.boxShadow = palette.shadow;
                    e.currentTarget.style.transform = "translateY(0)";
                  }}
                >

                    fontSize: 24, marginBottom: 10,

                    fontSize: 16, fontWeight: 700, color: palette.dark,
                    fontFamily: "'Montserrat', sans-serif", marginBottom: 4,

                  <div style={{
                    fontSize: 12, color: palette.muted,
                    fontFamily: "'Open Sans', sans-serif",

            if (action.type === "LOAD_DATA") dispatch({ type: "SET_VIEW", payload: "reservations" });
          }} />
        ) : state.view === "reservations" ? (
          <>
            {/* Stats */}
            <div style={{ display: "flex", gap: 14, marginBottom: 28, flexWrap: "wrap" }}>
              <StatCard label="Total" value={counts.all} sub="Upcoming reservations" color={palette.blueLight} />
              <StatCard label="Confirmed" value={counts.confirmed} sub={`${counts.all > 0 ? ((counts.confirmed / counts.all) * 100).toFixed(0) : 0}% confirmed`} color={palette.greenLight} />
              <StatCard label="Pending" value={counts.pending} sub="Awaiting response" color={palette.amberLight} />
              <StatCard label="Unsent" value={unsent} sub="Messages not sent" color={palette.redLight} />
            </div>

            {/* Controls */}
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              marginBottom: 16, flexWrap: "wrap", gap: 12,
            }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["all", "confirmed", "pending", "unconfirmed", "cancelled"].map((f) => (
                  <button
                    key={f}
                    onClick={() => dispatch({ type: "SET_FILTER", payload: f })}
                    style={{
                      padding: "7px 16px", borderRadius: 8,
                      border: `1.5px solid ${state.filter === f ? palette.accent : palette.border}`,
                      background: state.filter === f ? palette.accentLight : "transparent",
                      color: state.filter === f ? palette.accent : palette.muted,
                      fontSize: 12, fontWeight: 600, cursor: "pointer",
                      fontFamily: "'Open Sans', sans-serif",
                      textTransform: "capitalize", transition: "all 0.15s",
                    }}
                  >
                    {f === "all" ? "All" : statusConfig[f]?.label || f} ({counts[f]})
                  </button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <div style={{ position: "relative" }}>
                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: palette.muted, fontSize: 14 }}>⌕</span>
                  <input
                    type="text"
                    placeholder="Search name, ID, service..."
                    value={state.search}
                    onChange={(e) => dispatch({ type: "SET_SEARCH", payload: e.target.value })}
                    style={{
                      padding: "9px 14px 9px 34px", borderRadius: 10,
                      border: `1.5px solid ${palette.border}`, background: palette.card,
                      fontSize: 13, fontFamily: "'Open Sans', sans-serif",
                      color: palette.dark, width: 240, outline: "none",
                      transition: "border-color 0.15s",
                    }}
                    onFocus={(e) => e.target.style.borderColor = palette.accent}
                    onBlur={(e) => e.target.style.borderColor = palette.border}
                  />
                </div>
                {unsent > 0 && (
                  <button
                    onClick={() => liveDispatch({ type: "SEND_ALL_REMINDERS" })}
                    style={{
                      padding: "9px 20px", borderRadius: 10, border: "none",
                      background: palette.accent, color: "#fff",
                      fontSize: 13, fontWeight: 600, cursor: "pointer",
                      fontFamily: "'Open Sans', sans-serif",
                      boxShadow: `0 2px 8px ${palette.accent}40`,
                      transition: "transform 0.1s",
                    }}
                    onMouseDown={(e) => e.target.style.transform = "scale(0.97)"}
                    onMouseUp={(e) => e.target.style.transform = "scale(1)"}
                  >
                    Send All ({unsent})
                  </button>
                )}
              </div>
            </div>

            {/* Reservation List */}
            <div>
              {filtered.length === 0 ? (
                <div style={{
                  textAlign: "center", padding: 60, color: palette.muted,
                  fontFamily: "'Open Sans', sans-serif", fontSize: 14,
                }}>
                  No reservations match your filters.
                </div>
              ) : (
                <>
                  {/* Select All Header */}
                  <div style={{
                    display: "flex", alignItems: "center", gap: 12,
                    padding: "10px 20px 6px", marginBottom: 4,
                  }}>
                    <div
                      onClick={() => {
                        const filteredIds = filtered.map((r) => r.id);
                        const allSelected = filteredIds.every((id) => state.selected.has(id));
                        if (allSelected) dispatch({ type: "DESELECT_ALL" });
                        else dispatch({ type: "SELECT_ALL_FILTERED", payload: filteredIds });
                      }}
                      style={{
                        width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                        border: `2px solid ${filtered.length > 0 && filtered.every((r) => state.selected.has(r.id)) ? palette.accent : palette.border}`,
                        background: filtered.length > 0 && filtered.every((r) => state.selected.has(r.id)) ? palette.accent
                          : filtered.some((r) => state.selected.has(r.id)) ? palette.accentLight : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        cursor: "pointer", transition: "all 0.15s",
                      }}
                    >
                      {filtered.length > 0 && filtered.every((r) => state.selected.has(r.id)) && (
                        <span style={{ color: "#fff", fontSize: 13, fontWeight: 700, lineHeight: 1 }}>✓</span>
                      )}
                      {filtered.some((r) => state.selected.has(r.id)) && !filtered.every((r) => state.selected.has(r.id)) && (
                        <span style={{ color: palette.accent, fontSize: 15, fontWeight: 700, lineHeight: 1 }}>–</span>
                      )}
                    </div>
                    <span style={{
                      fontSize: 12, color: palette.muted, fontWeight: 500,
                      fontFamily: "'Open Sans', sans-serif",
                    }}>
                      {state.selected.size > 0
                        ? `${state.selected.size} selected`
                        : `Select all (${filtered.length})`}
                    </span>
                    {state.selected.size > 0 && (
                      <span
                        onClick={() => dispatch({ type: "DESELECT_ALL" })}
                        style={{
                          fontSize: 12, color: palette.accent, cursor: "pointer",
                          fontWeight: 500, fontFamily: "'Open Sans', sans-serif",
                        }}
                      >Clear</span>
                    )}
                  </div>

                  {filtered.map((res) => (
                    <ReservationRow
                      key={res.id}
                      res={res}
                      isSelected={state.selectedId === res.id}
                      isChecked={state.selected.has(res.id)}
                      dispatch={liveDispatch}
                    />
                  ))}
                </>
              )}

              {/* Bulk Action Bar */}
              {state.selected.size > 0 && (
                <BulkActionBar
                  count={state.selected.size}
                  dispatch={liveDispatch}
                  reservations={state.reservations}
                  selected={state.selected}
                />
              )}
            </div>
          </>
        ) : state.view === "automation" ? (
          <AutomationPanel reservations={state.reservations} />
        ) : null}
      </div>

      {state.showToast && (
        <Toast message={state.showToast} onDismiss={() => dispatch({ type: "DISMISS_TOAST" })} />
      )}

      {/* SMS Drawer */}
      {state.smsDrawer && (() => {
        const smsRes = state.reservations.find((r) => r.id === state.smsDrawer);
        if (!smsRes) return null;
        return (
          <>
            <SmsOverlay onClose={() => dispatch({ type: "CLOSE_SMS" })} />
            <SmsDrawer reservation={smsRes} dispatch={liveDispatch} />
          </>
        );
      })()}

      {/* SMS Compose Modal */}
      {state.smsCompose && (
        <SmsComposeModal
          compose={state.smsCompose}
          reservations={state.reservations}
          dispatch={dispatch}
          onSend={liveDispatch}
        />
      )}
    </>
  );
}

// --- Login Screen ---
function LoginScreen({ onLogin }) {
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    try {
      const result = await api.login(password);
      if (result.success) {
        onLogin();
      } else {
        setError(result.error || "Invalid password");
      }
    } catch (err) {
      setError("Connection error. Please try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{
      minHeight: "100vh",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      background: "linear-gradient(135deg, #0f2027, #203a43, #2c5364)",
      fontFamily: "'Montserrat', sans-serif",
    }}>
      <form onSubmit={handleSubmit} style={{
        background: "rgba(255,255,255,0.07)",
        backdropFilter: "blur(12px)",
        borderRadius: 16,
        padding: "48px 40px",
        width: 380,
        maxWidth: "90vw",
        boxShadow: "0 8px 32px rgba(0,0,0,0.3)",
        border: "1px solid rgba(255,255,255,0.1)",
        textAlign: "center",
      }}>
        <h1 style={{ color: "#fff", fontSize: 22, marginBottom: 8, fontWeight: 700 }}>
          Reservation SMS Dashboard
        </h1>
        <p style={{ color: "rgba(255,255,255,0.5)", fontSize: 13, marginBottom: 32 }}>
          FBC NE Florida - Admin Access
        </p>
        {error && (
          <div style={{
            background: "rgba(239,68,68,0.15)",
            border: "1px solid rgba(239,68,68,0.3)",
            color: "#fca5a5",
            borderRadius: 8,
            padding: "10px 14px",
            fontSize: 13,
            marginBottom: 16,
          }}>{error}</div>
        )}
        <input
          type="password"
          placeholder="Enter password"
          value={password}
          onChange={(e) => setPassword(e.target.value)}
          autoFocus
          style={{
            width: "100%",
            padding: "12px 16px",
            borderRadius: 8,
            border: "1px solid rgba(255,255,255,0.15)",
            background: "rgba(255,255,255,0.08)",
            color: "#fff",
            fontSize: 15,
            outline: "none",
            marginBottom: 20,
            boxSizing: "border-box",
          }}
        />
        <button
          type="submit"
          disabled={loading || !password}
          style={{
            width: "100%",
            padding: "12px 0",
            borderRadius: 8,
            border: "none",
            background: loading ? "#555" : "linear-gradient(135deg, #0ea5e9, #2563eb)",
            color: "#fff",
            fontSize: 15,
            fontWeight: 600,
            cursor: loading ? "not-allowed" : "pointer",
          }}
        >
          {loading ? "Signing in..." : "Sign In"}
        </button>
      </form>
    </div>
  );
}

// --- App Wrapper with Auth Gate ---
function App() {
  const [authenticated, setAuthenticated] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    api.checkSession().then((data) => {
      if (data.authenticated) setAuthenticated(true);
      setChecking(false);
    }).catch(() => setChecking(false));
  }, []);

  if (checking) {
    return (
      <div style={{
        minHeight: "100vh",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        background: "linear-gradient(135deg, #0f2027, #203a43, #2c5364)",
        color: "rgba(255,255,255,0.5)",
        fontFamily: "'Montserrat', sans-serif",
        fontSize: 15,
      }}>Loading...</div>
    );
  }

  if (!authenticated) {
    return <LoginScreen onLogin={() => setAuthenticated(true)} />;
  }

  return <ReservationDashboard onLogout={() => setAuthenticated(false)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
  </script>
</body>
